<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버시큐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e17;--surface:#111827;--card:#141c2e;--border:#1e2d4a;
  --accent:#00d4ff;--accent2:#ff3b6b;--purple:#a78bfa;
  --text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;
  --green:#10b981;--yellow:#f59e0b;--orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* 헤더 */
header{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.97);border-bottom:1px solid var(--border);padding:0 1rem;}
.header-inner{display:flex;align-items:center;height:52px;gap:8px;}
.logo{font-size:18px;font-weight:900;flex:1;}
.logo span{color:var(--accent);}
.hbtn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.hbtn.purple{border-color:rgba(167,139,250,0.4);color:var(--purple);}

/* 검색 */
.search-wrap{padding:8px 1rem;background:var(--surface);border-bottom:1px solid var(--border);}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}

/* 탭 */
.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:9px 13px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab .n{font-size:10px;margin-left:2px;opacity:0.7;}

/* 상태 */
.status{padding:7px 1rem;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* 리스트 */
.list{padding-bottom:72px;}
.item{padding:11px 1rem;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:flex-start;gap:8px;}
.item:active{background:var(--surface);}
.item.selected{background:rgba(167,139,250,0.06);border-left:3px solid var(--purple);}
.item.read{opacity:0.4;}
.item-body{flex:1;min-width:0;}
.item-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:4px;}
.tag-red{background:rgba(255,59,107,0.15);color:var(--accent2);}
.tag-blue{background:rgba(0,212,255,0.12);color:var(--accent);}
.tag-yellow{background:rgba(245,158,11,0.12);color:var(--yellow);}
.tag-green{background:rgba(16,185,129,0.12);color:var(--green);}
.tag-purple{background:rgba(167,139,250,0.15);color:var(--purple);}
.tag-orange{background:rgba(249,115,22,0.12);color:var(--orange);}
.item-title{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;}
.item-right{flex-shrink:0;}
.sel-badge{width:20px;height:20px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;}

/* 모달 (하단 시트) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--card);border-top:1px solid var(--border);margin-top:auto;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s;}
.overlay.open .sheet{transform:translateY(0);}
.sheet-header{padding:12px 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sheet-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.sheet-body{overflow-y:auto;padding:1rem;flex:1;}
.sheet-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:7px;}
.sheet-title{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:6px;}
.sheet-meta{font-size:11px;color:var(--muted);margin-bottom:12px;}
.sheet-desc{font-size:13px;line-height:1.8;color:var(--dim);}
.sheet-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;}
.btn-primary{background:var(--accent);color:#0a0e17;font-weight:700;}
.btn-ghost{background:var(--surface);color:var(--dim);border:1px solid var(--border);}
.btn-purple{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.3);}

/* 하단 바 */
.hwpx-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,23,0.98);border-top:1px solid rgba(167,139,250,0.4);padding:10px 1rem;display:flex;align-items:center;gap:8px;z-index:150;transform:translateY(100%);transition:transform 0.3s;}
.hwpx-bar.show{transform:translateY(0);}
.hwpx-count{font-size:13px;color:var(--purple);font-weight:700;}
.hwpx-hint{font-size:12px;color:var(--muted);flex:1;}

/* 진행 모달 */
.prog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;}
.prog-box{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:360px;padding:1.25rem;}
.prog-title{font-size:14px;font-weight:700;margin-bottom:1rem;}
.prog-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem;}
.prog-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);}
.prog-icon{font-size:14px;flex-shrink:0;}
.prog-bar-wrap{background:var(--border);border-radius:3px;height:3px;overflow:hidden;margin-bottom:7px;}
.prog-bar{background:var(--accent);height:100%;border-radius:3px;transition:width 0.4s;width:0%;}
.prog-status{font-size:11px;color:var(--muted);text-align:center;}

/* 토스트 */
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--accent2);color:var(--accent2);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">사이버<span>시큐</span></div>
    <button class="hbtn purple" id="selBtn" onclick="toggleSelect()">📄 뉴스레터</button>
    <button class="hbtn" onclick="loadFeeds()">🔄</button>
  </div>
</header>

<div class="search-wrap">
  <input class="search-input" id="searchInput" placeholder="기사 검색..." oninput="applyFilter()">
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="setTab('all',this)">전체 <span class="n" id="n-all"></span></div>
  <div class="tab" onclick="setTab('보안뉴스',this)">보안뉴스 <span class="n" id="n-보안뉴스"></span></div>
  <div class="tab" onclick="setTab('데일리시큐',this)">데일리시큐 <span class="n" id="n-데일리시큐"></span></div>
  <div class="tab" onclick="setTab('KISA',this)">KISA <span class="n" id="n-KISA"></span></div>
  <div class="tab" onclick="setTab('해외',this)">해외 <span class="n" id="n-해외"></span></div>
  <div class="tab" onclick="setTab('네이버',this)">네이버 <span class="n" id="n-네이버"></span></div>
</div>

<div class="status"><span class="dot"></span><span id="statusText">로딩 중...</span></div>

<div class="list" id="list"></div>

<!-- 상세 시트 -->
<div class="overlay" id="overlay" onclick="closeBg(event)">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-tag" id="sheetTag"></span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-meta" id="sheetMeta"></div>
      <div class="sheet-desc" id="sheetDesc"></div>
      <div class="sheet-actions">
        <a class="btn btn-ghost" id="sheetLink" href="#" target="_blank">🔗 원문</a>
        <button class="btn btn-purple" id="sheetSelBtn" onclick="toggleSelectFromSheet()">+ 뉴스레터 선택</button>
      </div>
    </div>
  </div>
</div>

<!-- 하단 선택 바 -->
<div class="hwpx-bar" id="hwpxBar">
  <span class="hwpx-count" id="hwpxCount">0개 선택</span>
  <span class="hwpx-hint">최대 5개</span>
  <button class="btn btn-ghost" style="font-size:12px;padding:5px 10px;" onclick="toggleSelect()">취소</button>
  <button class="btn btn-primary" id="hwpxBtn" style="font-size:12px;padding:5px 10px;" onclick="startGenerate()" disabled>생성</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────────
const OWNER      = 'JmDev77';
const REPO       = 'fcscNews';
const GH_TOKEN   = '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';  // ← 토큰 여기에 입력
const FEEDS_URL  = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data/feeds.json`;
const RESULT_BASE= `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data/`;
const API_BASE   = `https://api.github.com/repos/${OWNER}/${REPO}`;

// ── 상태 ──────────────────────────────────────────────
let allArticles=[], filtered=[], activeTab='all', curItem=null;
let selectMode=false, selected=[];
const READ_KEY='csec_read';

const getRead=()=>{try{return new Set(JSON.parse(localStorage.getItem(READ_KEY)||'[]'));}catch{return new Set();}};
const markRead=u=>{const s=getRead();s.add(u);localStorage.setItem(READ_KEY,JSON.stringify([...s].slice(-500)));};

let toastTimer;
function showToast(msg,type='',dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}

// ── 데이터 로드 ───────────────────────────────────────
async function loadFeeds(){
  document.getElementById('statusText').textContent='로딩 중...';
  try{
    const r=await fetch(FEEDS_URL+'?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    allArticles=data.articles||[];
    updateBadges();
    applyFilter();
    const t=data.fetched_at?new Date(data.fetched_at).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    document.getElementById('statusText').textContent=`${allArticles.length}건 · ${t} 갱신`;
  }catch(e){
    document.getElementById('statusText').textContent='로드 실패';
    console.error(e);
  }
}

function updateBadges(){
  document.getElementById('n-all').textContent=allArticles.length;
  ['보안뉴스','데일리시큐','KISA','해외','네이버'].forEach(g=>{
    const el=document.getElementById(`n-${g}`);
    if(el) el.textContent=allArticles.filter(a=>a.group===g).length;
  });
}

function setTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter(){
  let list=allArticles;
  if(activeTab!=='all') list=list.filter(a=>a.group===activeTab);
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) list=list.filter(a=>a.title.toLowerCase().includes(q)||(a.desc||'').toLowerCase().includes(q));
  filtered=list;
  renderList();
}

// ── 리스트 렌더링 ─────────────────────────────────────
function renderList(){
  const el=document.getElementById('list');
  if(!filtered.length){el.innerHTML='<div class="empty">📭 기사가 없습니다</div>';return;}
  const readSet=getRead();
  el.innerHTML=filtered.map((a,i)=>{
    const isRead=readSet.has(a.url);
    const selIdx=selected.findIndex(s=>s.url===a.url);
    const isSel=selIdx>=0;
    return `<div class="item${isRead?' read':''}${isSel?' selected':''}" onclick="onItem(${i})">
      <div class="item-body">
        <span class="item-tag ${a.tagCls||'tag-blue'}">${a.tag||'보안'}</span>
        <div class="item-title">${esc(a.title)}</div>
        <div class="item-meta"><span>${esc(a.source)}</span><span>${a.date||''}</span></div>
      </div>
      ${selectMode&&isSel?`<div class="item-right"><div class="sel-badge">${selIdx+1}</div></div>`:''}
    </div>`;
  }).join('');
}

function onItem(i){
  const a=filtered[i];
  if(selectMode){toggleSel(a);return;}
  openSheet(a);
}

// ── 시트 ─────────────────────────────────────────────
function openSheet(a){
  curItem=a;
  markRead(a.url);
  document.getElementById('sheetTag').className=`sheet-tag ${a.tagCls||'tag-blue'}`;
  document.getElementById('sheetTag').textContent=a.tag||'보안';
  document.getElementById('sheetTitle').textContent=a.title;
  document.getElementById('sheetMeta').textContent=`${a.source} · ${a.date}`;
  document.getElementById('sheetDesc').textContent=a.desc||'미리보기 없음';
  document.getElementById('sheetLink').href=a.url;
  const isSel=selected.some(s=>s.url===a.url);
  document.getElementById('sheetSelBtn').textContent=isSel?'✓ 선택됨':'+ 뉴스레터 선택';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  renderList();
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeSheet();}
function toggleSelectFromSheet(){
  if(!curItem)return;
  toggleSel(curItem);
  const isSel=selected.some(s=>s.url===curItem.url);
  document.getElementById('sheetSelBtn').textContent=isSel?'✓ 선택됨':'+ 뉴스레터 선택';
}

// ── 선택 모드 ─────────────────────────────────────────
function toggleSelect(){
  selectMode=!selectMode;
  selected=[];
  const bar=document.getElementById('hwpxBar');
  const btn=document.getElementById('selBtn');
  if(selectMode){bar.classList.add('show');btn.textContent='✕ 취소';}
  else{bar.classList.remove('show');btn.textContent='📄 뉴스레터';}
  updateCount();renderList();
}

function toggleSel(a){
  const idx=selected.findIndex(s=>s.url===a.url);
  if(idx>=0){selected.splice(idx,1);}
  else{
    if(selected.length>=5){showToast('최대 5개까지 선택 가능해요','err');return;}
    selected.push(a);
  }
  updateCount();renderList();
}

function updateCount(){
  document.getElementById('hwpxCount').textContent=`${selected.length}개 선택`;
  document.getElementById('hwpxBtn').disabled=selected.length===0;
}

// ── hwpx 생성 플로우 ──────────────────────────────────
async function startGenerate(){
  if(!selected.length)return;

  // 진행 모달
  const overlay=document.createElement('div');
  overlay.className='prog-overlay';
  const reqId=Date.now().toString(36);
  overlay.innerHTML=`
    <div class="prog-box">
      <div class="prog-title">📄 뉴스레터 생성 중...</div>
      <div class="prog-list" id="pList"></div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="pBar"></div></div>
      <div class="prog-status" id="pStatus">GitHub Actions 실행 중...</div>
    </div>`;
  document.body.appendChild(overlay);

  const pList=document.getElementById('pList');
  const pBar=document.getElementById('pBar');
  const pStatus=document.getElementById('pStatus');

  selected.forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='prog-item';
    el.id=`pi-${i}`;
    el.innerHTML=`<span class="prog-icon" id="ico-${i}">⬜</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;">${esc(a.title)}</span>`;
    pList.appendChild(el);
  });

  const setBar=p=>pBar.style.width=p+'%';
  const setIcon=(i,ic)=>{const e=document.getElementById(`ico-${i}`);if(e)e.textContent=ic;};

  try{
    // 1. GitHub Actions workflow_dispatch 호출
    pStatus.textContent='크롤링 + 요약 요청 중...';
    setBar(10);

    const articles=selected.map(a=>({
      title:  a.title,
      url:    a.url,
      source: a.source,
      date:   a.date,
      desc:   a.desc||'',
      tag:    a.tag||'보안',
      tagCls: a.tagCls||'tag-blue',
      lang:   a.lang||'ko',
    }));

    const triggerRes=await fetch(`${API_BASE}/actions/workflows/summarize.yml/dispatches`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${GH_TOKEN}`,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json',
      },
      body:JSON.stringify({
        ref:'main',
        inputs:{
          articles: JSON.stringify(articles),
          request_id: reqId,
        }
      })
    });

    if(!triggerRes.ok){
      const err=await triggerRes.text();
      throw new Error(`Actions 실행 실패: ${triggerRes.status} ${err}`);
    }

    pStatus.textContent='GitHub Actions 실행 중... (보통 1~2분 소요)';
    setBar(20);
    selected.forEach((_,i)=>setIcon(i,'⏳'));

    // 2. result.json 폴링 (최대 3분)
    const resultUrl=`${RESULT_BASE}result_${reqId}.json`;
    let result=null;
    const maxWait=180, interval=5;
    let waited=0;

    while(waited<maxWait){
      await sleep(interval*1000);
      waited+=interval;
      setBar(20+Math.min(60,Math.round(waited/maxWait*60)));
      pStatus.textContent=`결과 대기 중... (${waited}초/${maxWait}초)`;

      try{
        const r=await fetch(resultUrl+'?t='+Date.now());
        if(r.ok){
          result=await r.json();
          if(result.status==='done') break;
        }
      }catch{}
    }

    if(!result||result.status!=='done') throw new Error('타임아웃 — Actions 완료 대기 초과');

    result.articles.forEach((_,i)=>setIcon(i,'✅'));
    setBar(85);
    pStatus.textContent='hwpx 파일 생성 중...';

    // 3. hwpx 생성
    const hwpxBlob=await buildHwpx(result.articles);
    setBar(100);
    pStatus.textContent='완료!';

    const no=String(3500+Math.floor((new Date()-new Date('2020-01-01'))/(864e5)));
    const a=document.createElement('a');
    a.href=URL.createObjectURL(hwpxBlob);
    a.download=`정보보안뉴스레터_${no}.hwpx`;
    a.click();
    URL.revokeObjectURL(a.href);

    showToast('✅ 다운로드 완료!','ok',4000);
    setTimeout(()=>{document.body.removeChild(overlay);toggleSelect();},1500);

  }catch(e){
    pStatus.textContent='❌ '+e.message;
    showToast('❌ 생성 실패','err',5000);
    setTimeout(()=>document.body.removeChild(overlay),4000);
  }
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ── hwpx 생성 (JSZip) ────────────────────────────────
async function buildHwpx(items){
  const tmplUrl=`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/template.hwpx`;
  const tmplRes=await fetch(tmplUrl);
  if(!tmplRes.ok) throw new Error('template.hwpx 로드 실패');
  const tmplBuf=await tmplRes.arrayBuffer();

  if(!window.JSZip) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');

  const zip=await JSZip.loadAsync(tmplBuf);
  let sec=await zip.file('Contents/section0.xml').async('string');
  let hdr=await zip.file('Contents/header.xml').async('string');

  hdr=patchHeader(hdr);

  const today=new Date();
  const dateStr=`'${String(today.getFullYear()).slice(2)}. ${today.getMonth()+1}. ${today.getDate()}.`;
  const no=String(3500+Math.floor((today-new Date('2020-01-01'))/(864e5)));
  sec=sec.replace(/정보보안 뉴스레터 \d+/,`정보보안 뉴스레터 ${no}`);
  sec=sec.replace(/\[ '\d+\. \d+\. \d+\. \]/,`[ ${dateStr} ]`);

  sec=sec.replace(/<hp:tbl id="1275761286"[\s\S]*?<\/hp:tbl>/,buildSummaryTable(items));
  sec=sec.replace(
    /(<hp:tc[^>]*borderFillIDRef="20"[^>]*>)<hp:subList[\s\S]*?<\/hp:subList>/,
    `$1<hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0">${buildBody(items)}</hp:subList>`
  );

  zip.file('Contents/section0.xml',sec);
  zip.file('Contents/header.xml',hdr);
  return zip.generateAsync({type:'blob',mimeType:'application/octet-stream'});
}

function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function X(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function patchHeader(hdr){
  if(hdr.indexOf('paraPr id="100"')<0){
    const s=hdr.indexOf('<hh:paraPr id="31"');
    if(s>=0){
      const e=hdr.indexOf('</hh:paraPr>',s)+'</hh:paraPr>'.length;
      let p=hdr.slice(s,e).replace('id="31"','id="100"')
        .replace('breakLatinWord="BREAK_WORD"','breakLatinWord="KEEP_WORD"')
        .replace(/lineWrap="BREAK"/g,'lineWrap="KEEP_WORD"');
      p=p.replace(/(<hc:next value=")0(" unit="HWPUNIT"\/>)/g,'$11000$2');
      hdr=hdr.slice(0,e)+p+hdr.slice(e);
      hdr=hdr.replace(/(paraProperties[^>]*itemCnt=")(\d+)(")/,(_,a,n,b)=>a+(+n+1)+b);
    }
  }
  return hdr;
}

function ep(paraPr,charPr,text,cb='0'){
  return `<hp:p id="2147483648" paraPrIDRef="${paraPr}" styleIDRef="0" pageBreak="0" columnBreak="${cb}" merged="0"><hp:run charPrIDRef="${charPr}"><hp:t>${X(text)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="552" horzpos="0" horzsize="46604" flags="393216"/></hp:linesegarray></hp:p>`;
}
function empty(pp='27',cp='11'){
  return `<hp:p id="0" paraPrIDRef="${pp}" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="${cp}"/><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="200" textheight="200" baseline="170" spacing="112" horzpos="0" horzsize="46604" flags="393216"/></hp:linesegarray></hp:p>`;
}

harPrIDRef="9"><hp:t>날짜</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="552" horzpos="0" horzsize="2584" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="2" rowAddr="0"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="3606" height="2065"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc><hp:tc name="" header="0" hasMargin="0" protect="0" editable="0" dirty="0" borderFillIDRef="10"><hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0"><hp:p id="2147483648" paraPrIDRef="15" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="9"><hp:t>출처</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="552" horzpos="0" horzsize="6468" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="3" rowAddr="0"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="7489" height="2065"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc></hp:tr>`;
  const rows=items.map(it=>`<hp:tr><hp:tc name="" header="0" hasMargin="0" protect="0" editable="0" dirty="0" borderFillIDRef="11"><hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0"><hp:p id="2147483648" paraPrIDRef="15" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="9"><hp:t>${X(it.no)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="552" horzpos="0" horzsize="1440" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="0" rowAddr="${it.no}"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="2191" height="2131"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc><hp:tc name="" header="0" hasMargin="0" protect="0" editable="0" dirty="0" borderFillIDRef="12"><hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0"><hp:p id="2147483648" paraPrIDRef="25" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="12"><hp:t>${X(it.title)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="500" spacing="552" horzpos="0" horzsize="33336" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="1" rowAddr="${it.no}"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="34359" height="2131"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc><hp:tc name="" header="0" hasMargin="0" protect="0" editable="0" dirty="0" borderFillIDRef="12"><hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0"><hp:p id="2147483648" paraPrIDRef="22" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="12"><hp:t>${X(it.date)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="500" spacing="552" horzpos="0" horzsize="2584" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="2" rowAddr="${it.no}"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="3606" height="2131"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc><hp:tc name="" header="0" hasMargin="0" protect="0" editable="0" dirty="0" borderFillIDRef="13"><hp:subList id="" textDirection="HORIZONTAL" lineWrap="BREAK" vertAlign="CENTER" linkListIDRef="0" linkListNextIDRef="0" textWidth="0" textHeight="0" hasTextRef="0" hasNumRef="0"><hp:p id="2147483648" paraPrIDRef="22" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="12"><hp:t>${X(it.source)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="500" spacing="552" horzpos="0" horzsize="6468" flags="393216"/></hp:linesegarray></hp:p></hp:subList><hp:cellAddr colAddr="3" rowAddr="${it.no}"/><hp:cellSpan colSpan="1" rowSpan="1"/><hp:cellSz width="7489" height="2131"/><hp:cellMargin left="510" right="510" top="141" bottom="141"/></hp:tc></hp:tr>`).join('');
  const h=2065+2131*items.length;
  return `<hp:tbl id="1275761286" zOrder="4" numberingType="TABLE" textWrap="TOP_AND_BOTTOM" textFlow="BOTH_SIDES" lock="0" dropcapstyle="None" pageBreak="CELL" repeatHeader="1" rowCnt="${items.length+1}" colCnt="4" cellSpacing="0" borderFillIDRef="3" noAdjust="1"><hp:sz width="47645" widthRelTo="ABSOLUTE" height="${h}" heightRelTo="ABSOLUTE" protect="0"/><hp:pos treatAsChar="1" affectLSpacing="0" flowWithText="1" allowOverlap="0" holdAnchorAndSO="0" vertRelTo="PARA" horzRelTo="PARA" vertAlign="TOP" horzAlign="LEFT" vertOffset="0" horzOffset="0"/><hp:outMargin left="283" right="283" top="283" bottom="283"/><hp:inMargin left="510" right="510" top="141" bottom="141"/>${hdr}${rows}</hp:tbl>`;

function buildBody(items){
  const colBr=`<hp:p id="2147483648" paraPrIDRef="23" styleIDRef="0" pageBreak="0" columnBreak="1" merged="0"><hp:run charPrIDRef="14"><hp:ctrl><hp:colPr id="" type="NEWSPAPER" layout="LEFT" colCount="1" sameSz="1" sameGap="0"/></hp:ctrl></hp:run><hp:run charPrIDRef="14"><hp:t/></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="552" horzpos="0" horzsize="46604" flags="393216"/></hp:linesegarray></hp:p>`;
  const footer=
    `<hp:p id="2147483648" paraPrIDRef="23" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="25"><hp:t>※ 웹사이트 개발·수정 시 </hp:t></hp:run><hp:run charPrIDRef="28"><hp:t>\u201c</hp:t></hp:run><hp:run charPrIDRef="25"><hp:t>주요 브라우저 업데이트 내용 확인 및 영향도 분석 후 적용</hp:t></hp:run><hp:run charPrIDRef="28"><hp:t>\u201d</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1100" textheight="1100" baseline="935" spacing="604" horzpos="0" horzsize="46604" flags="393216"/></hp:linesegarray></hp:p>`+
    ep('28','20','○ 구글 크롬: chromereleases.googleblog.com')+
    ep('28','20','○ MS 엣지: learn.microsoft.com/ko-kr/deployedge/microsoft-edge-release-schedule')+
    ep('28','20','○ 파이어폭스: www.mozilla.org/en-US/firefox/releases');

  let out=colBr;

  // 1페이지 요약
  items.forEach(it=>{
    out+=ep('26','14',`${it.no}. ${it.title} [${it.source}]`);
    out+=empty('26','15');
    if(it.summary1){out+=ep('27','11',`○ ${it.summary1}`);out+=empty('27','16');}
    if(it.summary2){out+=ep('27','11',`○ ${it.summary2}`);out+=empty('28','17');}
  });
  out+=footer;
  out+=empty('23','11');out+=empty('23','11');
  out+=ep('23','14','  [본문]');
  out+=empty('24','15');

  // 2페이지~ 본문
  items.forEach((it,i)=>{
    out+=ep('30','14',` ${it.no}. ${it.title} [${it.source}]`);
    out+=empty('31','11');
    const paras=(it.body||'').split('\n').map(s=>s.trim()).filter(Boolean);
    paras.forEach(para=>{
      out+=`<hp:p id="2147483648" paraPrIDRef="100" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0"><hp:run charPrIDRef="11"><hp:t>${X(para)}</hp:t></hp:run><hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000" baseline="850" spacing="600" horzpos="0" horzsize="46604" flags="393216"/></hp:linesegarray></hp:p>`;
      out+=empty('31','11');
    });
    if(it.url) out+=ep('31','11',`[원문기사] ${it.url}`);
    if(i<items.length-1){out+=empty('31','11');out+=empty('31','11');}
  });
  return out;
}
